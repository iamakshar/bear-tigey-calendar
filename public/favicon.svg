<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 48">
  <!-- ── Bear (left) ── -->
  <!-- Ears -->
  <circle cx="13" cy="10" r="7"  fill="#c4622a"/>
  <circle cx="31" cy="10" r="7"  fill="#c4622a"/>
  <circle cx="13" cy="10" r="4"  fill="#d4824a"/>
  <circle cx="31" cy="10" r="4"  fill="#d4824a"/>
  <!-- Head -->
  <circle cx="22" cy="28" r="17" fill="#c4622a"/>
  <!-- Muzzle -->
  <ellipse cx="22" cy="34" rx="8" ry="6" fill="#d4824a"/>
  <!-- Eyes -->
  <circle cx="16" cy="25" r="2.5" fill="#1c1713"/>
  <circle cx="28" cy="25" r="2.5" fill="#1c1713"/>
  <circle cx="16.8" cy="24.2" r="0.9" fill="white"/>
  <circle cx="28.8" cy="24.2" r="0.9" fill="white"/>
  <!-- Nose -->
  <ellipse cx="22" cy="31.5" rx="3" ry="2" fill="#1c1713"/>
  <!-- Smile -->
  <path d="M18.5 35.5 Q22 38.5 25.5 35.5" stroke="#1c1713" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- ── Tigey (right) ── -->
  <!-- Ears (pointed tiger ears) -->
  <polygon points="50,11 54,3 58,11" fill="#e07820"/>
  <polygon points="66,11 70,3 74,11" fill="#e07820"/>
  <polygon points="51.5,10 54,4.5 56.5,10" fill="#f5a050"/>
  <polygon points="67.5,10 70,4.5 72.5,10" fill="#f5a050"/>
  <!-- Head -->
  <circle cx="62" cy="28" r="17" fill="#e07820"/>
  <!-- Stripes on forehead -->
  <path d="M58 14 Q60 18 58 21" stroke="#1c1713" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M62 13 L62 19" stroke="#1c1713" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M66 14 Q64 18 66 21" stroke="#1c1713" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Muzzle -->
  <ellipse cx="62" cy="34" rx="8" ry="6" fill="#f5c090"/>
  <!-- Cheek stripes -->
  <path d="M44 28 Q48 29 50 31" stroke="#1c1713" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M80 28 Q76 29 74 31" stroke="#1c1713" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="56" cy="25" r="2.5" fill="#1c1713"/>
  <circle cx="68" cy="25" r="2.5" fill="#1c1713"/>
  <circle cx="56.8" cy="24.2" r="0.9" fill="white"/>
  <circle cx="68.8" cy="24.2" r="0.9" fill="white"/>
  <!-- Nose -->
  <ellipse cx="62" cy="31.5" rx="3" ry="2" fill="#1c1713"/>
  <!-- Smile -->
  <path d="M58.5 35.5 Q62 38.5 65.5 35.5" stroke="#1c1713" stroke-width="1.3" fill="none" stroke-linecap="round"/>
</svg>
